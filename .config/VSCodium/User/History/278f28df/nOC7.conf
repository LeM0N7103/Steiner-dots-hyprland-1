general {
    gaps_in = 2
    gaps_out = 3

    border_size = 2

    col.active_border = rgba(e6b450ee) rgba(ff8f40ee) 45deg
    col.inactive_border = rgba(5c6773aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 30
        render_power = 6
        offset = 5, 8
        color = rgba(000000aa)
    }
    blur {
        enabled = false
    }
}