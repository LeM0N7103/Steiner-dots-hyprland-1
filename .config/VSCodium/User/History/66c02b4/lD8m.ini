font=Iosevka Nerd Font:size=14
pad=10x10

[scrollback]
lines=10000

[cursor]
style=beam
blink=no
beam-thickness=1.5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+f
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
delete-prev-word=Control+BackSpace

[colors-dark]
foreground=B3B1AD
background=0A0E14

regular0=01060E   # black
regular1=EA6C73   # red
regular2=91B362   # green
regular3=F9AF4F   # yellow
regular4=53BDFA   # blue
regular5=FAE994   # magenta
regular6=90E1C6   # cyan
regular7=C7C7C7   # white

bright0=686868    # bright black (gray)
bright1=F07178    # bright red
bright2=C2D94C    # bright green
bright3=FFB454    # bright yellow
bright4=59C2FF    # bright blue
bright5=FFEE99    # bright magenta
bright6=95E6CB    # bright cyan
bright7=FFFFFF    # bright white

selection-background=53BDFA
selection-foreground=0A0E14

urls=59C2FF